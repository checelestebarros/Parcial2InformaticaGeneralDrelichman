<!DOCTYPE html>
<html lang="es">
<head>
     <style>
@import url('https://fonts.googleapis.com/css2?family=Abel&family=Geist+Pixel&display=swap');
</style>
<link rel="stylesheet" href="css/estilos.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion</title>
</head>
<body>
    <header>
        <h1>Laurie Anderson</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="obras.html">Obras</a></li>
            </ul>
        </nav>
    </header>
 
    <main class="contenedorGestion">
        <h2>Gestión del repositorio de grabaciones</h2>

        <section classs = "contenedorGestion">
            
           
             <article class="columnasGestion">
             <h3> Carga de datos</h3>
             <p>Complete los datos en orden</p>

             <!--primer form-->
             <div id="pCantidad" class="paso">
                <h4> Paso 1: Cantidad de grabaciones</h4>
                <label for="inCantidadObras">¿Cuántas obras se van cargar?</label>
                <input type="number" id="inCantidadObras" name="inCantidadObras" min="1">
               <button id="btnConfrmCant">Confirmar cantidad</button>
               <p id="msjCantidad" class="mensaje"></p>
            </div>
             <label for="inNombreObra">Nombre de la obra</label>
                    <input type="text" id="inNombreObra"> 

                      <label for="inputDuracionObra">Duración (minutos)</label>
                    <input type="number" id="inputDuracionObra" min="0.1">

                     <label for="inputPesoObra">Peso del archivo (MB)</label>
                    <input type="number" id="inputPesoObra" min="0.1">
       
                     <button id="btnAgregarObra" >Agregar obra</button>
                    <p id="contadorObras" class="mensaje"></p>
                </div>


                  <div id="pasoGral" class="pasoG">
                    <label for="inputTiempoTransferencia">
                        Tiempo estimado de transferencia (ms por MB)
                    </label>
                    <input type="number" id="inputTiempoTransferencia" min="0.1">
                        <label for="inputCostoMB">Costo mensual de almacenamiento por MB ($)</label>
                    <input type="number" id="inputCostoMB" min="0.01">
                     <button id="btnGuardarGrales" >Guardar datos generales</button>
                </div>

                </section>

    </main>



    <script src="js/script.js"></script>

</body>
</html>
